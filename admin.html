<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>관리자 - 우수팀 투표</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Noto Sans KR"', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'] },
                    colors: {
                        sys: { bg:'#f5f5f7', card:'#ffffff', border:'#e5e5ea', text:'#1d1d1f', sub:'#86868b', caption:'#aeaeb2' },
                        blue: { DEFAULT:'#007AFF', dark:'#0056CC' },
                        green: { DEFAULT:'#34C759' },
                        red: { DEFAULT:'#FF3B30' },
                        orange: { DEFAULT:'#FF9500' },
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', -apple-system, system-ui, sans-serif; background: #f5f5f7; color: #1d1d1f; -webkit-font-smoothing: antialiased; }
        .page { display: none; width: 100%; }
        .page.active { display: flex; }

        .fade-in { animation: fadeIn 0.35s ease both; }
        .fade-up { animation: fadeUp 0.4s ease both; }
        .slide-up { animation: slideUp 0.5s cubic-bezier(0.25,1,0.5,1) both; }
        .scale-in { animation: scaleIn 0.4s cubic-bezier(0.25,1,0.5,1) both; }

        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        @keyframes scaleIn { from{opacity:0;transform:scale(0.92)} to{opacity:1;transform:scale(1)} }
        @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
        @keyframes crownDrop { from{opacity:0;transform:translateY(-20px) scale(1.2)} to{opacity:1;transform:translateY(0) scale(1)} }
        @keyframes glow { 0%,100%{box-shadow:0 0 30px rgba(0,122,255,0.06)} 50%{box-shadow:0 0 50px rgba(0,122,255,0.12)} }

        .crown-drop { animation: crownDrop 0.5s cubic-bezier(0.25,1,0.5,1) both; }
        .winner-glow { animation: glow 3s ease-in-out infinite; }
        .shimmer-text { background:linear-gradient(90deg,#1d1d1f 0%,#007AFF 40%,#1d1d1f 60%); background-size:200% auto; -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:shimmer 3.5s linear infinite; }

        .bar-fill { transition: width 1.4s cubic-bezier(0.25,1,0.5,1); }
        .card { background:#fff; border-radius:16px; box-shadow: 0 0 0 0.5px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.03); }

        .btn-primary { background:#007AFF; color:#fff; border:none; border-radius:14px; font-weight:600; font-size:16px; padding:16px; width:100%; transition:all 0.15s ease; cursor:pointer; }
        .btn-primary:hover { background:#0056CC; }
        .btn-primary:active { transform:scale(0.98); opacity:0.9; }
        .btn-secondary { background:#f5f5f7; color:#007AFF; border:none; border-radius:14px; font-weight:600; font-size:16px; padding:16px; width:100%; transition:all 0.15s ease; cursor:pointer; }
        .btn-secondary:hover { background:#ebebed; }
        .btn-secondary:active { transform:scale(0.98); }
        .btn-danger { background:#FF3B30; color:#fff; border:none; border-radius:14px; font-weight:600; font-size:15px; padding:14px; width:100%; transition:all 0.15s ease; cursor:pointer; }
        .btn-danger:hover { background:#d63028; }
        .btn-danger:active { transform:scale(0.98); }
        .btn-text { color:#007AFF; font-weight:500; background:none; border:none; cursor:pointer; transition:opacity 0.15s; }
        .btn-text:hover { opacity:0.7; }

        .input-field { width:100%; padding:14px 16px; font-size:16px; background:#fff; border:1px solid #e5e5ea; border-radius:12px; outline:none; transition:all 0.2s; color:#1d1d1f; }
        .input-field:focus { border-color:#007AFF; box-shadow:0 0 0 3px rgba(0,122,255,0.12); }
        .input-field::placeholder { color:#aeaeb2; }

        .nav-bar { background:rgba(245,245,247,0.85); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px); border-bottom:0.5px solid rgba(0,0,0,0.1); padding:12px 20px; position:sticky; top:0; z-index:50; }

        .result-row { opacity:0; }
        .result-row.visible { animation: slideUp 0.5s cubic-bezier(0.25,1,0.5,1) both; }

        /* 프로젝터 - 유일한 다크 화면 */
        .projector-mode { position:fixed; inset:0; z-index:200; background:#000; overflow-y:auto; }

        .loading-spinner { border:2px solid rgba(0,122,255,0.15); border-top-color:#007AFF; border-radius:50%; width:18px; height:18px; animation:spin 0.7s linear infinite; display:inline-block; }
        @keyframes spin { to{transform:rotate(360deg)} }

        ::-webkit-scrollbar { width:0; height:0; }
    </style>
</head>
<body>

    <!-- ========== 관리자 설정 ========== -->
    <div id="page-admin" class="page active flex-col min-h-screen bg-sys-bg">
        <div class="nav-bar">
            <div class="max-w-lg mx-auto flex items-center">
                <a href="index.html" class="btn-text text-[17px]">←</a>
                <h2 class="flex-1 text-center text-[17px] font-semibold">관리자 설정</h2>
                <span class="w-6"></span>
            </div>
        </div>
        <div class="flex-1 max-w-lg mx-auto w-full p-5 pb-10">
            <div class="card p-5 mb-3 fade-up">
                <label class="block text-[12px] font-semibold text-sys-caption mb-2.5 tracking-wide uppercase">과제명</label>
                <input id="input-task" type="text" placeholder="예: 프로젝트 최종 발표" class="input-field">
            </div>
            <div class="card p-5 mb-4 fade-up" style="animation-delay:0.04s">
                <div class="flex items-center justify-between mb-4">
                    <label class="text-[12px] font-semibold text-sys-caption tracking-wide uppercase">팀 목록</label>
                    <div class="flex gap-2">
                        <button onclick="removeTeamInput()" id="btn-remove-team"
                            class="w-8 h-8 rounded-full bg-sys-bg flex items-center justify-center text-sys-sub text-[18px] hover:bg-red/10 hover:text-red transition-colors leading-none">−</button>
                        <button onclick="addTeamInput()"
                            class="w-8 h-8 rounded-full bg-sys-bg flex items-center justify-center text-sys-sub text-[18px] hover:bg-blue/10 hover:text-blue transition-colors leading-none">+</button>
                    </div>
                </div>
                <div id="team-inputs" class="space-y-2"></div>
            </div>
            <div class="flex gap-2.5 fade-up" style="animation-delay:0.08s">
                <button onclick="saveSettings()" class="btn-primary flex-1 text-[15px]">저장 및 시작</button>
                <button onclick="resetFirebase()" class="btn-secondary text-[15px]" style="flex:0 0 auto; width:auto; padding:16px 24px; color:#86868b;">초기화</button>
            </div>

            <!-- 이전 투표방 불러오기 -->
            <div id="prev-room-section" class="mt-6 hidden">
                <button onclick="loadPrevRoom()" class="btn-secondary w-full text-[14px]" style="color:#86868b;">
                    이전 투표방 이어서 관리
                </button>
            </div>
        </div>
    </div>

    <!-- ========== Firebase 설정 ========== -->
    <div id="page-firebase" class="page flex-col min-h-screen bg-sys-bg">
        <div class="nav-bar">
            <div class="max-w-lg mx-auto flex items-center">
                <button onclick="showPage('page-admin')" class="btn-text text-[17px]">←</button>
                <h2 class="flex-1 text-center text-[17px] font-semibold">Firebase 연결</h2>
                <span class="w-6"></span>
            </div>
        </div>
        <div class="flex-1 max-w-lg mx-auto w-full p-5 pb-10">
            <div class="card p-5 mb-4 fade-up">
                <p class="text-[14px] text-sys-sub mb-4 leading-relaxed">
                    다중 기기 실시간 투표를 위해 Firebase가 필요합니다.
                    <a href="https://console.firebase.google.com/" target="_blank" class="text-blue font-medium">Console 열기 →</a>
                </p>
                <label class="block text-[12px] font-semibold text-sys-caption mb-2 tracking-wide uppercase">Config JSON</label>
                <textarea id="firebase-config-input" rows="7" placeholder='{ "apiKey": "...", "databaseURL": "..." }'
                    class="input-field font-mono text-[13px] resize-none"></textarea>
            </div>
            <button onclick="saveFirebaseConfig()" class="btn-primary text-[15px]">연결하기</button>
            <p id="firebase-error" class="text-red text-[13px] text-center mt-3 hidden"></p>
        </div>
    </div>

    <!-- ========== QR코드 & 대기 ========== -->
    <div id="page-qr" class="page flex-col min-h-screen bg-sys-bg">
        <div class="nav-bar">
            <div class="max-w-lg mx-auto flex items-center">
                <button onclick="showPage('page-admin')" class="btn-text text-[17px]">←</button>
                <div class="flex-1 text-center min-w-0">
                    <h2 class="text-[17px] font-semibold truncate" id="qr-task-title">투표 진행 중</h2>
                </div>
                <button onclick="showPage('page-result')" class="btn-text text-[15px]">결과</button>
            </div>
        </div>
        <div class="flex-1 flex flex-col items-center justify-center p-6">
            <div class="card p-7 text-center max-w-sm w-full fade-up">
                <p class="text-[12px] text-sys-caption font-semibold tracking-wide uppercase mb-1">과제</p>
                <h3 class="text-[18px] font-bold mb-6" id="qr-task-title-2"></h3>

                <div class="inline-block mb-5 p-4 bg-white rounded-2xl" style="box-shadow:0 2px 12px rgba(0,0,0,0.06);">
                    <div id="qr-image" class="flex justify-center"></div>
                </div>

                <div class="bg-sys-bg rounded-2xl p-4 mb-5">
                    <p class="text-[11px] text-sys-caption font-semibold uppercase tracking-widest mb-1">참여 코드</p>
                    <p id="room-code-display" class="text-[28px] font-extrabold tracking-[0.25em] font-mono text-sys-text"></p>
                </div>

                <div class="flex items-center justify-center gap-2 mb-5">
                    <span class="relative flex h-2 w-2" id="live-dot">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-green"></span>
                    </span>
                    <span class="text-[14px] text-sys-sub">현재 <strong id="vote-count" class="text-[20px] font-extrabold text-sys-text">0</strong>표</span>
                </div>

                <p class="text-sys-caption text-[12px] mb-4" id="qr-status-text">QR코드를 스캔하여 참여하세요</p>

                <div id="close-vote-section">
                    <button onclick="closeVoting()" id="btn-close-vote" class="btn-danger text-[14px]">투표 마감</button>
                </div>
                <div id="vote-closed-badge" class="hidden">
                    <div class="bg-sys-bg text-sys-sub rounded-2xl px-5 py-3 text-[14px] font-semibold inline-block">마감됨</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== 결과 페이지 ========== -->
    <div id="page-result" class="page flex-col min-h-screen bg-sys-bg">
        <div class="nav-bar">
            <div class="max-w-lg mx-auto flex items-center">
                <button onclick="showPage('page-qr')" class="btn-text text-[17px]">←</button>
                <h2 class="flex-1 text-center text-[17px] font-semibold">결과</h2>
                <div class="flex gap-1">
                    <button onclick="openProjector()" class="w-8 h-8 rounded-full flex items-center justify-center text-sys-sub hover:bg-white transition-colors" title="프로젝터 모드">
                        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v11.25A2.25 2.25 0 006 16.5h2.25M3.75 3h16.5M3.75 3l2.664 11.943M20.25 3v11.25A2.25 2.25 0 0118 16.5h-2.25M20.25 3l-2.664 11.943M12 16.5V21m-4.5-1.5h9"/></svg>
                    </button>
                </div>
            </div>
        </div>
        <div class="flex-1 max-w-lg mx-auto w-full p-5">
            <div id="result-task-name" class="text-center mb-5 fade-up">
                <p class="text-[11px] text-sys-caption font-semibold uppercase tracking-widest mb-1">과제</p>
                <h3 class="text-[20px] font-bold"></h3>
            </div>
            <div id="reveal-section" class="text-center mb-6">
                <button onclick="startReveal()" id="btn-reveal"
                    class="btn-primary text-[15px] inline-flex items-center justify-center gap-2" style="width:auto; padding:14px 32px;">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M6.3 2.841A1.5 1.5 0 004 4.12V15.88a1.5 1.5 0 002.3 1.28l9.344-5.88a1.5 1.5 0 000-2.56L6.3 2.84z"/></svg>
                    순위 공개
                </button>
            </div>
            <div id="winner-section" class="mb-5"></div>
            <div id="result-bars" class="space-y-2"></div>
            <p class="text-center mt-6 text-sys-caption text-[12px]" id="total-votes-text"></p>
        </div>
    </div>

    <!-- ========== 프로젝터 모드 (다크) ========== -->
    <div id="projector-overlay" class="hidden projector-mode">
        <div class="min-h-screen flex flex-col items-center justify-center p-8 md:p-16 relative">
            <button onclick="closeProjector()"
                class="absolute top-5 right-5 w-10 h-10 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center text-white/40 hover:text-white transition-all text-[18px] z-10">✕</button>
            <div id="proj-content" class="w-full max-w-3xl text-center"></div>
        </div>
    </div>

    <!-- ========== 로딩 ========== -->
    <div id="loading-overlay" class="hidden fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center z-[100]">
        <div class="card px-6 py-4 flex items-center gap-3">
            <div class="loading-spinner"></div>
            <span class="text-sys-sub text-[14px] font-medium" id="loading-text">불러오는 중...</span>
        </div>
    </div>

<script>
const TEAM_COLORS = ['#FF6482','#5AC8FA','#34C759','#FF9500','#AF52DE','#FF3B30','#00C7BE','#FFD60A'];
let db = null, currentRoom = null, sessionConfig = null, voteListener = null;
let revealInProgress = false;

const DEFAULT_FB_CONFIG = {
    apiKey:"AIzaSyBSu2xGWCIwXwkWaTsS24eLpuu9lXc7Sfs", authDomain:"prime-motif-495504-n4.firebaseapp.com",
    databaseURL:"https://prime-motif-495504-n4-default-rtdb.firebaseio.com", projectId:"prime-motif-495504-n4",
    storageBucket:"prime-motif-495504-n4.firebasestorage.app", messagingSenderId:"342640634708",
    appId:"1:342640634708:web:49fd2d940e91d52adeb6c1"
};

function getFirebaseConfig() { try { const r=localStorage.getItem('fb-config'); return r?JSON.parse(r):DEFAULT_FB_CONFIG; } catch{return DEFAULT_FB_CONFIG;} }
function initFirebase(config) { if(!firebase.apps.length) firebase.initializeApp(config); db=firebase.database(); }
function saveFirebaseConfig() {
    const raw = document.getElementById('firebase-config-input').value.trim();
    const err = document.getElementById('firebase-error'); err.classList.add('hidden');
    let config;
    try { config=JSON.parse(raw); } catch{ err.textContent='JSON 형식이 올바르지 않습니다'; err.classList.remove('hidden'); return; }
    if(!config.databaseURL){ err.textContent='databaseURL이 필요합니다'; err.classList.remove('hidden'); return; }
    try { initFirebase(config); localStorage.setItem('fb-config',JSON.stringify(config)); showPage('page-admin'); }
    catch(e){ err.textContent='연결 실패: '+e.message; err.classList.remove('hidden'); }
}
function ensureFirebase() { if(db) return true; const c=getFirebaseConfig(); if(!c) return false; initFirebase(c); return true; }

function showPage(id) {
    if(['page-admin','page-qr','page-result'].includes(id) && !ensureFirebase()) id='page-firebase';
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(voteListener){voteListener();voteListener=null;}
    const inits={page_admin:initAdmin,'page-qr':initQR,'page-result':initResult};
    if(id==='page-admin') initAdmin();
    if(id==='page-qr') initQR();
    if(id==='page-result') initResult();
}
function showLoading(t){document.getElementById('loading-text').textContent=t||'불러오는 중...';document.getElementById('loading-overlay').classList.remove('hidden');}
function hideLoading(){document.getElementById('loading-overlay').classList.add('hidden');}

// Admin
function initAdmin() {
    const teams = JSON.parse(localStorage.getItem('admin-teams')||'null') || ['1팀','2팀','3팀'];
    document.getElementById('input-task').value = localStorage.getItem('admin-task') || '';
    const c = document.getElementById('team-inputs'); c.innerHTML='';
    teams.forEach((n,i)=>addTeamField(n,i));
    updateRemoveBtn();
    // 이전 투표방 확인
    const prev = localStorage.getItem('current-room');
    document.getElementById('prev-room-section').classList.toggle('hidden', !prev);
}
function addTeamField(name, idx) {
    const c = document.getElementById('team-inputs');
    const d = document.createElement('div');
    d.className = 'flex items-center gap-3 fade-up';
    d.style.animationDelay = `${idx*0.03}s`;
    d.innerHTML = `<span class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:${TEAM_COLORS[idx%8]}"></span>
        <input type="text" value="${name}" placeholder="팀 이름" class="team-name-input input-field text-[15px]" style="padding:12px 14px">`;
    c.appendChild(d);
}
function addTeamInput() {
    const c = document.getElementById('team-inputs');
    if(c.children.length>=10) return alert('최대 10팀까지 가능합니다');
    addTeamField(`${c.children.length+1}팀`, c.children.length);
    updateRemoveBtn();
}
function removeTeamInput() {
    const c = document.getElementById('team-inputs');
    if(c.children.length<=2) return;
    c.lastChild.remove(); updateRemoveBtn();
}
function updateRemoveBtn() {
    const n=document.getElementById('team-inputs').children.length;
    const b=document.getElementById('btn-remove-team');
    b.disabled=n<=2; b.classList.toggle('opacity-30',n<=2); b.classList.toggle('cursor-not-allowed',n<=2);
}
function genCode(){ const ch='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let c=''; for(let i=0;i<6;i++) c+=ch[Math.floor(Math.random()*ch.length)]; return c; }
async function saveSettings() {
    const task = document.getElementById('input-task').value.trim();
    if(!task) return alert('과제명을 입력해주세요.');
    const teams = Array.from(document.querySelectorAll('.team-name-input')).map(i=>i.value.trim()).filter(Boolean);
    if(teams.length<2) return alert('최소 2팀 이상 필요합니다');
    if(!ensureFirebase()) return showPage('page-firebase');
    showLoading('투표방 생성 중...');
    const code = genCode();
    try {
        await db.ref('rooms/'+code+'/config').set({task,teams,createdAt:Date.now(),closed:false});
        currentRoom=code; sessionConfig={task,teams,closed:false};
        localStorage.setItem('admin-task',task);
        localStorage.setItem('admin-teams',JSON.stringify(teams));
        localStorage.setItem('current-room',code);
        hideLoading(); showPage('page-qr');
    } catch(e){ hideLoading(); alert('실패: '+e.message); }
}
function loadPrevRoom() {
    const code = localStorage.getItem('current-room');
    if(!code) return;
    if(!ensureFirebase()) return showPage('page-firebase');
    currentRoom = code;
    showPage('page-qr');
}
function resetFirebase() {
    if(!confirm('설정을 초기화하시겠습니까?')) return;
    ['fb-config','current-room','admin-task','admin-teams'].forEach(k=>localStorage.removeItem(k));
    db=null; showPage('page-firebase');
}

// Close voting
async function closeVoting() {
    if(!confirm('투표를 마감하시겠습니까?\n마감 후 투표가 불가합니다.')) return;
    try { await db.ref('rooms/'+currentRoom+'/config/closed').set(true); updateCloseUI(true); }
    catch(e){ alert('마감 실패: '+e.message); }
}
function updateCloseUI(closed) {
    document.getElementById('close-vote-section').classList.toggle('hidden',closed);
    document.getElementById('vote-closed-badge').classList.toggle('hidden',!closed);
    document.getElementById('qr-status-text').textContent = closed?'투표가 마감되었습니다':'QR코드를 스캔하여 참여하세요';
    const dot = document.getElementById('live-dot');
    dot.innerHTML = closed
        ? '<span class="relative inline-flex rounded-full h-2 w-2 bg-sys-caption"></span>'
        : '<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-green"></span>';
}

// QR
function initQR() {
    if(!currentRoom){currentRoom=localStorage.getItem('current-room'); if(!currentRoom) return showPage('page-admin');}
    db.ref('rooms/'+currentRoom+'/config').on('value', snap=>{
        const d=snap.val(); if(!d) return;
        sessionConfig=d;
        document.getElementById('qr-task-title').textContent=d.task;
        document.getElementById('qr-task-title-2').textContent=d.task;
        document.getElementById('room-code-display').textContent=currentRoom;
        updateCloseUI(!!d.closed);
    });
    // QR은 index.html의 투표 페이지를 가리킴
    const base = window.location.href.split('admin.html')[0] || window.location.origin+'/';
    generateQR(base+'index.html?room='+currentRoom);
    listenVoteCount();
}
function listenVoteCount() {
    if(voteListener) voteListener();
    const ref = db.ref('rooms/'+currentRoom+'/votes');
    const cb = ref.on('value', snap=>{ document.getElementById('vote-count').textContent=Object.keys(snap.val()||{}).length; });
    voteListener = ()=>ref.off('value',cb);
}
function generateQR(text) {
    const c=document.getElementById('qr-image'); c.innerHTML='';
    const img=document.createElement('img');
    img.src=`https://api.qrserver.com/v1/create-qr-code/?size=180x180&color=1d1d1f&data=${encodeURIComponent(text)}`;
    img.alt='QR코드'; img.width=180; img.height=180; img.style.borderRadius='4px';
    img.onerror=()=>{c.innerHTML='<p class="text-sys-caption text-[13px] p-4">QR 코드를 불러올 수 없습니다</p>';};
    c.appendChild(img);
}

// Result data
function getResultData(callback) {
    if(!currentRoom){currentRoom=localStorage.getItem('current-room'); if(!currentRoom) return;}
    db.ref('rooms/'+currentRoom).once('value').then(snap=>{
        const room=snap.val(); if(!room?.config) return;
        const config=room.config, raw=room.votes||{};
        const counts={}; config.teams.forEach(t=>counts[t]=0);
        Object.values(raw).forEach(v=>{if(counts[v.team]!==undefined) counts[v.team]++;});
        const total=Object.values(counts).reduce((a,b)=>a+b,0);
        const sorted=config.teams.map(t=>({name:t,votes:counts[t]||0,idx:config.teams.indexOf(t)})).sort((a,b)=>b.votes-a.votes);
        callback({config,total,sorted});
    });
}

// Result page
function initResult() {
    revealInProgress=false;
    document.getElementById('reveal-section').classList.remove('hidden');
    document.getElementById('btn-reveal').disabled=false;
    document.getElementById('winner-section').innerHTML='';
    document.getElementById('result-bars').innerHTML='';
    document.getElementById('total-votes-text').textContent='';
    getResultData(({config,total})=>{
        document.querySelector('#result-task-name h3').textContent=config.task;
        document.getElementById('total-votes-text').textContent=`총 ${total}명 참여`;
        if(total===0){
            document.getElementById('reveal-section').innerHTML=`<div class="card p-10 text-center border border-dashed border-sys-border mb-6"><p class="text-sys-caption text-[14px] font-medium">아직 투표가 없습니다</p></div>`;
        }
    });
}

// Reveal
async function startReveal() {
    if(revealInProgress) return;
    revealInProgress=true;
    document.getElementById('btn-reveal').disabled=true;
    getResultData(async({config,total,sorted})=>{
        if(total===0) return;
        document.getElementById('reveal-section').classList.add('hidden');
        const barsEl=document.getElementById('result-bars'); barsEl.innerHTML='';
        const maxV=sorted[0].votes||1;
        for(let i=sorted.length-1;i>=0;i--){
            const t=sorted[i];
            const pct=total>0?Math.round(t.votes/total*100):0;
            const barW=maxV>0?(t.votes/maxV*100):0;
            const color=TEAM_COLORS[t.idx%8];
            const div=document.createElement('div');
            div.className='result-row';
            div.innerHTML=`<div class="card p-4"><div class="flex items-center gap-3 mb-2"><span class="w-6 text-[13px] font-bold text-sys-caption text-center">${i+1}</span><span class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:${color}"></span><span class="font-semibold text-[15px] flex-1">${t.name}</span><span class="font-bold text-[17px]">${t.votes}<span class="text-[12px] text-sys-caption font-medium ml-1">${pct}%</span></span></div><div class="ml-9 bg-sys-bg rounded-full h-[6px] overflow-hidden"><div class="bar-fill h-full rounded-full" style="width:0;background:${color}" data-w="${barW}%"></div></div></div>`;
            barsEl.prepend(div);
            await sleep(450); div.classList.add('visible');
            await sleep(120); div.querySelector('.bar-fill').style.width=div.querySelector('.bar-fill').dataset.w;
            await sleep(650);
        }
        if(sorted[0].votes>0){
            await sleep(400);
            const w=sorted[0]; const color=TEAM_COLORS[w.idx%8];
            document.getElementById('winner-section').innerHTML=`
                <div class="scale-in winner-glow card p-7 text-center relative overflow-hidden" style="border:1.5px solid rgba(0,122,255,0.15);">
                    <div class="relative z-10">
                        <div class="text-[40px] mb-1 crown-drop leading-none">🏆</div>
                        <p class="text-sys-caption text-[11px] font-semibold uppercase tracking-widest mb-2">우수팀</p>
                        <h2 class="text-[30px] font-extrabold mb-1 shimmer-text">${w.name}</h2>
                        <p class="text-[18px] font-bold text-sys-sub">${w.votes}표 · ${Math.round(w.votes/total*100)}%</p>
                    </div>
                    <div class="absolute inset-0 opacity-[0.03]" style="background:radial-gradient(circle at 50% 0%,${color},transparent 60%)"></div>
                </div>`;
            await sleep(300); fireConfetti();
        }
        revealInProgress=false;
    });
}

function fireConfetti(){
    const end=Date.now()+2500;
    const frame=()=>{
        confetti({particleCount:2,angle:60,spread:50,origin:{x:0,y:0.65},colors:['#007AFF','#FF6482','#FFD60A']});
        confetti({particleCount:2,angle:120,spread:50,origin:{x:1,y:0.65},colors:['#34C759','#AF52DE','#5AC8FA']});
        if(Date.now()<end) requestAnimationFrame(frame);
    };
    frame();
}

// Projector
function openProjector(){
    getResultData(({config,total,sorted})=>{
        const el=document.getElementById('proj-content');
        const maxV=sorted[0]?.votes||1;
        let barsHtml='';
        sorted.forEach((t,i)=>{
            const pct=total>0?Math.round(t.votes/total*100):0;
            const barW=maxV>0?(t.votes/maxV*100):0;
            const color=TEAM_COLORS[t.idx%8];
            barsHtml+=`<div class="flex items-center gap-5 mb-5 slide-up" style="animation-delay:${0.3+i*0.1}s"><span class="text-[14px] font-bold text-white/20 w-8 text-right">${i+1}</span><div class="flex-1 text-left"><div class="flex items-baseline justify-between mb-2"><span class="text-white text-[20px] md:text-[28px] font-bold">${t.name}</span><span class="text-white/35 text-[16px] md:text-[20px] font-semibold">${t.votes}표 (${pct}%)</span></div><div class="w-full bg-white/5 rounded-full h-3 md:h-4 overflow-hidden"><div class="h-full rounded-full bar-fill" style="width:0;background:${color}" data-w="${barW}%"></div></div></div></div>`;
        });
        let winnerHtml='';
        if(total>0&&sorted[0].votes>0){
            const w=sorted[0];
            winnerHtml=`<div class="scale-in mb-10 md:mb-14"><div class="text-[56px] md:text-[72px] mb-2 crown-drop leading-none">🏆</div><p class="text-white/20 text-[12px] md:text-[14px] tracking-[0.2em] uppercase mb-3 font-semibold">우수팀 선정</p><h1 class="text-[40px] md:text-[64px] text-white font-extrabold mb-2" style="background:linear-gradient(90deg,#fff 0%,#007AFF 40%,#fff 60%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3.5s linear infinite">${w.name}</h1><p class="text-[22px] md:text-[32px] text-white/35 font-bold">${w.votes}표 · ${Math.round(w.votes/total*100)}%</p></div>`;
        }
        el.innerHTML=`<p class="text-white/15 text-[12px] tracking-[0.15em] uppercase mb-1 font-semibold">과제</p><h2 class="text-[22px] md:text-[32px] text-white/80 font-bold mb-8 md:mb-12">${config.task}</h2>${winnerHtml}<div class="text-left max-w-2xl mx-auto">${barsHtml}</div><p class="text-white/10 text-[12px] mt-8 font-medium">총 ${total}명 참여</p>`;
        document.getElementById('projector-overlay').classList.remove('hidden');
        setTimeout(()=>{document.querySelectorAll('#proj-content .bar-fill').forEach(b=>b.style.width=b.dataset.w);},800);
        if(total>0&&sorted[0].votes>0) setTimeout(fireConfetti,600);
    });
}
function closeProjector(){document.getElementById('projector-overlay').classList.add('hidden');}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// Boot
(function boot(){
    const config=getFirebaseConfig(); if(config) initFirebase(config);
    initAdmin();
})();
</script>
