<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우수팀 투표</title>
    <meta name="description" content="실시간 우수팀 투표">
    <meta property="og:title" content="우수팀 투표">
    <meta property="og:description" content="실시간 우수팀 선정 투표">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Noto Sans KR"', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'] },
                    colors: {
                        sys: { bg:'#f5f5f7', card:'#ffffff', border:'#e5e5ea', text:'#1d1d1f', sub:'#86868b', caption:'#aeaeb2' },
                        blue: { DEFAULT:'#007AFF', dark:'#0056CC' },
                        green: { DEFAULT:'#34C759' },
                        red: { DEFAULT:'#FF3B30' },
                        orange: { DEFAULT:'#FF9500' },
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', -apple-system, system-ui, sans-serif; background: #f5f5f7; color: #1d1d1f; -webkit-font-smoothing: antialiased; }
        .page { display: none; width: 100%; }
        .page.active { display: flex; }

        .fade-in { animation: fadeIn 0.35s ease both; }
        .fade-up { animation: fadeUp 0.4s ease both; }
        .scale-in { animation: scaleIn 0.4s cubic-bezier(0.25,1,0.5,1) both; }

        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        @keyframes scaleIn { from{opacity:0;transform:scale(0.92)} to{opacity:1;transform:scale(1)} }

        .card { background:#fff; border-radius:16px; box-shadow: 0 0 0 0.5px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.03); }

        .team-card { transition: all 0.2s ease; background:#fff; border-radius:14px; box-shadow: 0 0 0 0.5px rgba(0,0,0,0.04), 0 1px 4px rgba(0,0,0,0.02); }
        .team-card:active { transform: scale(0.98); }
        .team-card.selected { box-shadow: 0 0 0 2px #007AFF; background: #f0f7ff; }

        .btn-primary { background:#007AFF; color:#fff; border:none; border-radius:14px; font-weight:600; font-size:16px; padding:16px; width:100%; transition:all 0.15s ease; cursor:pointer; }
        .btn-primary:hover { background:#0056CC; }
        .btn-primary:active { transform:scale(0.98); opacity:0.9; }

        .btn-secondary { background:#f5f5f7; color:#007AFF; border:none; border-radius:14px; font-weight:600; font-size:16px; padding:16px; width:100%; transition:all 0.15s ease; cursor:pointer; }
        .btn-secondary:hover { background:#ebebed; }
        .btn-secondary:active { transform:scale(0.98); }

        .nav-bar { background:rgba(245,245,247,0.85); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px); border-bottom:0.5px solid rgba(0,0,0,0.1); padding:12px 20px; position:sticky; top:0; z-index:50; }

        .btn-text { color:#007AFF; font-weight:500; background:none; border:none; cursor:pointer; transition:opacity 0.15s; }
        .btn-text:hover { opacity:0.7; }

        .loading-spinner { border:2px solid rgba(0,122,255,0.15); border-top-color:#007AFF; border-radius:50%; width:18px; height:18px; animation:spin 0.7s linear infinite; display:inline-block; }
        @keyframes spin { to{transform:rotate(360deg)} }

        ::-webkit-scrollbar { width:0; height:0; }
    </style>
</head>
<body>

    <!-- ========== 홈 ========== -->
    <div id="page-home" class="page active flex-col items-center justify-center min-h-screen bg-white relative">
        <div class="text-center px-8 relative z-10 max-w-sm mx-auto w-full fade-in">
            <div class="mb-10">
                <div class="inline-flex items-center justify-center w-[72px] h-[72px] rounded-[22px] bg-blue mb-7" style="box-shadow:0 6px 20px rgba(0,122,255,0.25);">
                    <span class="text-[32px] leading-none">🏆</span>
                </div>
                <h1 class="text-[32px] font-extrabold tracking-tight leading-tight mb-2">우수팀 투표</h1>
                <p class="text-sys-sub text-[15px] font-normal">실시간 투표로 선정하는 우수팀</p>
            </div>
            <div class="space-y-3">
                <button onclick="joinByCode()" class="btn-primary">투표 참여</button>
            </div>
            <a href="admin.html" class="inline-block mt-10 text-sys-caption text-[13px] hover:text-sys-sub transition-colors">관리자 설정 →</a>
        </div>
    </div>

    <!-- ========== 투표 페이지 ========== -->
    <div id="page-vote" class="page flex-col min-h-screen bg-sys-bg">
        <div class="nav-bar">
            <div class="max-w-lg mx-auto text-center">
                <h2 class="text-[17px] font-semibold" id="vote-task-title">투표</h2>
                <p class="text-sys-caption text-[12px] mt-0.5">우수한 팀 하나를 선택하세요</p>
            </div>
        </div>
        <div class="flex-1 max-w-lg mx-auto w-full p-5">
            <div id="team-cards" class="space-y-2 mb-6"></div>
            <button id="btn-submit-vote" onclick="submitVote()" disabled
                class="btn-primary text-[15px] opacity-40 cursor-not-allowed">
                팀을 선택해주세요
            </button>
        </div>
        <div id="vote-done-overlay" class="hidden fixed inset-0 bg-black/40 backdrop-blur-md flex items-center justify-center z-50">
            <div class="card p-8 text-center max-w-[300px] mx-4 scale-in">
                <div class="w-14 h-14 bg-green/10 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-7 h-7 text-green" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                </div>
                <h3 class="text-[22px] font-bold mb-1">투표 완료</h3>
                <p class="text-sys-sub text-[14px] mb-6">소중한 한 표 감사합니다</p>
                <button onclick="showPage('page-home')" class="btn-primary text-[15px]">확인</button>
            </div>
        </div>
    </div>

    <!-- ========== 로딩 ========== -->
    <div id="loading-overlay" class="hidden fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center z-[100]">
        <div class="card px-6 py-4 flex items-center gap-3">
            <div class="loading-spinner"></div>
            <span class="text-sys-sub text-[14px] font-medium" id="loading-text">불러오는 중...</span>
        </div>
    </div>

<script>
const TEAM_COLORS = ['#FF6482','#5AC8FA','#34C759','#FF9500','#AF52DE','#FF3B30','#00C7BE','#FFD60A'];
let db = null, currentRoom = null, sessionConfig = null, selectedTeam = null;

const DEFAULT_FB_CONFIG = {
    apiKey:"AIzaSyBSu2xGWCIwXwkWaTsS24eLpuu9lXc7Sfs", authDomain:"prime-motif-495504-n4.firebaseapp.com",
    databaseURL:"https://prime-motif-495504-n4-default-rtdb.firebaseio.com", projectId:"prime-motif-495504-n4",
    storageBucket:"prime-motif-495504-n4.firebasestorage.app", messagingSenderId:"342640634708",
    appId:"1:342640634708:web:49fd2d940e91d52adeb6c1"
};

function getFirebaseConfig() { try { const r=localStorage.getItem('fb-config'); return r?JSON.parse(r):DEFAULT_FB_CONFIG; } catch{return DEFAULT_FB_CONFIG;} }
function initFirebase(config) { if(!firebase.apps.length) firebase.initializeApp(config); db=firebase.database(); }
function ensureFirebase() { if(db) return true; const c=getFirebaseConfig(); if(!c) return false; initFirebase(c); return true; }

function showPage(id) {
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id==='page-vote') initVote();
}
function showLoading(t) { document.getElementById('loading-text').textContent=t||'불러오는 중...'; document.getElementById('loading-overlay').classList.remove('hidden'); }
function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }

// Join
function joinByCode() {
    const code = prompt('참여 코드 6자리를 입력하세요:');
    if(!code) return;
    joinRoom(code.trim().toUpperCase());
}
async function joinRoom(code) {
    if(!ensureFirebase()) return alert('서버 연결에 실패했습니다.');
    showLoading('확인 중...');
    try {
        const snap = await db.ref('rooms/'+code+'/config').once('value');
        const d = snap.val();
        if(!d) { hideLoading(); alert('존재하지 않는 코드입니다.'); return; }
        currentRoom = code; sessionConfig = d; hideLoading(); showPage('page-vote');
    } catch(e) { hideLoading(); alert('연결 실패: '+e.message); }
}

// Vote
function initVote() {
    document.getElementById('vote-done-overlay').classList.add('hidden');
    document.getElementById('btn-submit-vote').style.display = '';
    selectedTeam = null;
    if(!sessionConfig||!currentRoom) {
        document.getElementById('team-cards').innerHTML = `<div class="text-center py-16 fade-up"><p class="text-[16px] font-semibold text-sys-sub mb-1">투표 정보 없음</p><p class="text-sys-caption text-[13px]">QR코드를 다시 스캔해주세요</p></div>`;
        document.getElementById('btn-submit-vote').style.display='none'; return;
    }
    if(sessionConfig.closed) {
        document.getElementById('team-cards').innerHTML = `<div class="text-center py-16 fade-up"><p class="text-[16px] font-semibold text-sys-sub mb-1">투표가 마감되었습니다</p><p class="text-sys-caption text-[13px]">이미 종료된 투표입니다</p></div>`;
        document.getElementById('btn-submit-vote').style.display='none'; return;
    }
    document.getElementById('vote-task-title').textContent = sessionConfig.task;
    const uid = getVoterId();
    db.ref('rooms/'+currentRoom+'/votes/'+uid).once('value').then(snap => {
        snap.val() ? showAlreadyVoted() : renderTeamCards();
    });
}
function renderTeamCards() {
    const c = document.getElementById('team-cards'); c.innerHTML='';
    sessionConfig.teams.forEach((team,i) => {
        const color = TEAM_COLORS[i%8];
        const card = document.createElement('button');
        card.className = 'team-card w-full p-4 text-left fade-up';
        card.style.animationDelay = `${i*0.04}s`;
        card.innerHTML = `<div class="flex items-center gap-3">
            <span class="w-3 h-3 rounded-full flex-shrink-0" style="background:${color}"></span>
            <span class="text-[16px] font-semibold flex-1">${team}</span>
            <div class="w-[22px] h-[22px] rounded-full border-[1.5px] border-sys-border flex items-center justify-center transition-all team-check">
                <svg class="w-3 h-3 opacity-0 transition-opacity text-blue" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg>
            </div></div>`;
        card.onclick = () => selectTeam(team, card);
        c.appendChild(card);
    });
    updateVoteBtn();
}
function selectTeam(team, card) {
    selectedTeam = team;
    document.querySelectorAll('.team-card').forEach(c => {
        c.classList.remove('selected');
        c.querySelector('.team-check').style.borderColor='';
        c.querySelector('.team-check').style.background='';
        c.querySelector('svg').classList.add('opacity-0');
    });
    card.classList.add('selected');
    card.querySelector('.team-check').style.borderColor='#007AFF';
    card.querySelector('.team-check').style.background='rgba(0,122,255,0.08)';
    card.querySelector('svg').classList.remove('opacity-0');
    updateVoteBtn();
}
function updateVoteBtn() {
    const b = document.getElementById('btn-submit-vote');
    if(selectedTeam) { b.disabled=false; b.className='btn-primary text-[15px]'; b.style.opacity='1'; b.style.cursor='pointer'; b.textContent=`${selectedTeam}에 투표`; }
    else { b.disabled=true; b.className='btn-primary text-[15px] opacity-40 cursor-not-allowed'; b.textContent='팀을 선택해주세요'; }
}
async function submitVote() {
    if(!selectedTeam||!currentRoom) return;
    const configSnap = await db.ref('rooms/'+currentRoom+'/config/closed').once('value');
    if(configSnap.val()) { alert('투표가 마감되었습니다.'); return; }
    const uid = getVoterId();
    const b = document.getElementById('btn-submit-vote'); b.disabled=true; b.innerHTML='<span class="loading-spinner" style="border-color:rgba(255,255,255,0.3);border-top-color:white"></span>';
    try {
        const snap = await db.ref('rooms/'+currentRoom+'/votes/'+uid).once('value');
        if(snap.val()) return showAlreadyVoted();
        await db.ref('rooms/'+currentRoom+'/votes/'+uid).set({ team:selectedTeam, timestamp:Date.now() });
        document.getElementById('vote-done-overlay').classList.remove('hidden');
    } catch(e) { alert('투표 실패: '+e.message); updateVoteBtn(); }
}
function showAlreadyVoted() {
    document.getElementById('team-cards').innerHTML = `<div class="text-center py-16 fade-up"><div class="w-12 h-12 bg-orange/10 rounded-full flex items-center justify-center mx-auto mb-3"><svg class="w-6 h-6 text-orange" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg></div><p class="text-[16px] font-semibold text-sys-sub mb-1">이미 투표하셨습니다</p><p class="text-sys-caption text-[13px]">한 사람당 한 번만 가능</p></div>`;
    document.getElementById('btn-submit-vote').style.display='none';
}
function getVoterId() { let id=localStorage.getItem('voter-uid'); if(!id){id='v_'+Math.random().toString(36).slice(2)+Date.now();localStorage.setItem('voter-uid',id);} return id; }

// Boot
(function boot() {
    const config = getFirebaseConfig(); if(config) initFirebase(config);
    const params = new URLSearchParams(window.location.search);
    const roomCode = params.get('room');
    if(roomCode && db) joinRoom(roomCode.toUpperCase());
})();
</script>
</body>
</html>
