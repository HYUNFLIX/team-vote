<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우수팀 투표</title>
    <meta name="description" content="QR코드 기반 실시간 우수팀 투표 앱">
    <meta property="og:title" content="우수팀 투표">
    <meta property="og:description" content="공정하고 즐거운 우수팀 선정">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Do+Hyeon&family=Jua&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans KR"', 'sans-serif'],
                        display: ['"Black Han Sans"', 'sans-serif'],
                        title: ['"Do Hyeon"', 'sans-serif'],
                        fun: ['"Jua"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans KR', sans-serif; }
        .page { display: none; width: 100%; }
        .page.active { display: flex; }

        .team-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .team-card:hover { transform: translateY(-6px) scale(1.02); }
        .team-card:active { transform: scale(0.97); }
        .team-card.selected { transform: scale(1.04); }

        .bar-fill { transition: width 1.8s cubic-bezier(0.22, 1, 0.36, 1); }

        .fade-in { animation: fadeIn 0.6s ease-out both; }
        .fade-in-up { animation: fadeInUp 0.6s ease-out both; }
        .slide-in { animation: slideIn 0.5s ease-out both; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 30px rgba(99, 102, 241, 0.2); } 50% { box-shadow: 0 0 60px rgba(99, 102, 241, 0.5); } }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        @keyframes scaleIn { from { opacity:0; transform: scale(0.3); } to { opacity:1; transform: scale(1); } }
        @keyframes drumroll { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        @keyframes slideUp { from { opacity:0; transform: translateY(60px) scale(0.9); } to { opacity:1; transform: translateY(0) scale(1); } }
        @keyframes crownDrop { from { opacity:0; transform: translateY(-40px) scale(1.5) rotate(-10deg); } to { opacity:1; transform: translateY(0) scale(1) rotate(0deg); } }

        .float { animation: float 3s ease-in-out infinite; }
        .winner-glow { animation: pulseGlow 2s ease-in-out infinite; }
        .shimmer-text {
            background: linear-gradient(90deg, #fff 0%, #ffd700 50%, #fff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }
        .scale-in { animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
        .drumroll { animation: drumroll 0.4s ease-in-out 3; }
        .slide-up { animation: slideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
        .crown-drop { animation: crownDrop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

        .gradient-main { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%); }
        .gradient-card-1 { background: linear-gradient(135deg, #f472b6 0%, #ec4899 100%); }
        .gradient-card-2 { background: linear-gradient(135deg, #38bdf8 0%, #3b82f6 100%); }
        .gradient-card-3 { background: linear-gradient(135deg, #34d399 0%, #10b981 100%); }
        .gradient-card-4 { background: linear-gradient(135deg, #fb923c 0%, #f97316 100%); }
        .gradient-card-5 { background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%); }
        .gradient-card-6 { background: linear-gradient(135deg, #f87171 0%, #ef4444 100%); }
        .gradient-card-7 { background: linear-gradient(135deg, #2dd4bf 0%, #14b8a6 100%); }
        .gradient-card-8 { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); }

        .glass { background: rgba(255,255,255,0.15); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.25); }
        .result-row { opacity: 0; }
        .result-row.visible { animation: slideUp 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
        .qr-wrapper { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
        input:focus, textarea:focus { box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }

        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); transition: all 0.3s; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4); }
        .btn-primary:active { transform: scale(0.97); }
        .btn-danger { background: linear-gradient(135deg, #f87171 0%, #ef4444 100%); transition: all 0.3s; }
        .btn-danger:hover { opacity: 0.9; transform: translateY(-2px); }

        .loading-spinner { border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 프로젝터 모드 */
        .projector-mode { position: fixed; inset: 0; z-index: 200; background: #0f0a1e; overflow-y: auto; }
        .projector-mode .proj-title { font-family: 'Do Hyeon', sans-serif; }
        .projector-mode .proj-team { font-family: 'Black Han Sans', sans-serif; }
        .projector-mode .proj-rank { font-family: 'Jua', sans-serif; }

        .closed-badge { background: linear-gradient(135deg, #ef4444, #dc2626); }
    </style>
</head>
<body class="min-h-screen bg-slate-50 antialiased">

    <!-- ========== 홈 ========== -->
    <div id="page-home" class="page active flex-col items-center justify-center min-h-screen gradient-main text-white relative overflow-hidden">
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
            <div class="absolute -top-40 -right-40 w-96 h-96 bg-white/10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-purple-400/20 rounded-full blur-3xl"></div>
        </div>
        <div class="text-center fade-in p-8 relative z-10">
            <div class="text-7xl mb-8 float">🏆</div>
            <h1 class="font-display text-5xl md:text-6xl mb-3 tracking-tight">우수팀 투표</h1>
            <p class="text-lg text-white/70 mb-14 font-fun">공정하고 즐거운 우수팀 선정</p>
            <div class="flex flex-col sm:flex-row gap-4 justify-center max-w-md mx-auto">
                <button onclick="showPage('page-admin')"
                    class="flex-1 px-8 py-4 bg-white text-indigo-600 rounded-2xl font-bold text-lg hover:bg-indigo-50 transition-all shadow-xl hover:shadow-2xl hover:-translate-y-1 active:scale-95">
                    관리자 설정
                </button>
                <button onclick="joinByCode()"
                    class="flex-1 px-8 py-4 glass text-white rounded-2xl font-bold text-lg hover:bg-white/25 transition-all active:scale-95">
                    투표 참여
                </button>
            </div>
        </div>
    </div>

    <!-- ========== Firebase 초기 설정 ========== -->
    <div id="page-firebase" class="page flex-col min-h-screen bg-slate-50">
        <header class="gradient-main text-white px-6 py-5 shadow-lg">
            <div class="max-w-lg mx-auto flex items-center gap-4">
                <button onclick="showPage('page-home')" class="w-10 h-10 rounded-xl glass flex items-center justify-center hover:bg-white/25 transition-all text-lg">←</button>
                <h2 class="text-xl font-bold flex-1">Firebase 연결 설정</h2>
            </div>
        </header>
        <div class="flex-1 max-w-lg mx-auto w-full p-5 pb-10">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-5 fade-in-up">
                <p class="text-sm text-slate-600 mb-4 leading-relaxed">
                    다중 기기 실시간 투표를 위해 Firebase 연결이 필요합니다.<br>
                    <a href="https://console.firebase.google.com/" target="_blank" class="text-indigo-600 underline font-medium">Firebase Console</a>에서 설정하세요.
                </p>
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">Firebase Config (JSON)</label>
                <textarea id="firebase-config-input" rows="8" placeholder='{ "apiKey": "...", "databaseURL": "..." }'
                    class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl text-xs font-mono focus:border-indigo-500 focus:outline-none transition-all bg-slate-50 placeholder:text-slate-300 resize-none"></textarea>
            </div>
            <button onclick="saveFirebaseConfig()" class="w-full py-4 btn-primary text-white rounded-2xl font-bold text-lg shadow-lg">연결하기</button>
            <p id="firebase-error" class="text-red-500 text-sm text-center mt-3 hidden"></p>
        </div>
    </div>

    <!-- ========== 관리자 설정 ========== -->
    <div id="page-admin" class="page flex-col min-h-screen bg-slate-50">
        <header class="gradient-main text-white px-6 py-5 shadow-lg">
            <div class="max-w-lg mx-auto flex items-center gap-4">
                <button onclick="showPage('page-home')" class="w-10 h-10 rounded-xl glass flex items-center justify-center hover:bg-white/25 transition-all text-lg">←</button>
                <h2 class="text-xl font-bold flex-1 font-title">관리자 설정</h2>
            </div>
        </header>
        <div class="flex-1 max-w-lg mx-auto w-full p-5 pb-10">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-5 fade-in-up">
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">과제명</label>
                <input id="input-task" type="text" placeholder="예: 프로젝트 최종 발표"
                    class="w-full px-4 py-3.5 border-2 border-slate-200 rounded-xl text-base focus:border-indigo-500 focus:outline-none transition-all bg-slate-50 placeholder:text-slate-300">
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-5 fade-in-up" style="animation-delay:0.1s">
                <div class="flex items-center justify-between mb-4">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">팀 목록</label>
                    <div class="flex gap-2">
                        <button onclick="removeTeamInput()" id="btn-remove-team"
                            class="w-9 h-9 flex items-center justify-center bg-red-50 text-red-400 rounded-xl text-lg font-bold hover:bg-red-100 hover:text-red-500 transition-all">−</button>
                        <button onclick="addTeamInput()"
                            class="w-9 h-9 flex items-center justify-center bg-indigo-50 text-indigo-500 rounded-xl text-lg font-bold hover:bg-indigo-100 transition-all">+</button>
                    </div>
                </div>
                <div id="team-inputs" class="space-y-3"></div>
            </div>
            <div class="flex gap-3 fade-in-up" style="animation-delay:0.2s">
                <button onclick="saveSettings()"
                    class="flex-1 py-4 btn-primary text-white rounded-2xl font-bold text-lg shadow-lg">저장 및 시작</button>
                <button onclick="resetFirebase()"
                    class="px-5 py-4 bg-white border-2 border-slate-200 text-slate-400 rounded-2xl font-bold hover:bg-slate-50 hover:text-slate-600 hover:border-slate-300 transition-all">초기화</button>
            </div>
        </div>
    </div>

    <!-- ========== QR코드 & 대기 ========== -->
    <div id="page-qr" class="page flex-col min-h-screen bg-slate-50">
        <header class="gradient-main text-white px-6 py-5 shadow-lg">
            <div class="max-w-lg mx-auto flex items-center gap-4">
                <button onclick="showPage('page-admin')" class="w-10 h-10 rounded-xl glass flex items-center justify-center hover:bg-white/25 transition-all text-lg">←</button>
                <div class="flex-1">
                    <h2 class="text-lg font-bold font-title" id="qr-task-title">투표 진행 중</h2>
                    <p class="text-white/60 text-xs" id="qr-status-text">QR코드를 스캔하여 투표에 참여하세요</p>
                </div>
                <button onclick="showPage('page-result')" class="px-4 py-2 glass rounded-xl text-sm font-bold hover:bg-white/25 transition-all">결과</button>
            </div>
        </header>
        <div class="flex-1 flex flex-col items-center justify-center p-6">
            <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-8 text-center max-w-sm w-full fade-in-up">
                <p class="text-sm text-slate-400 font-medium mb-1 font-fun">아래 QR코드를 스캔하세요</p>
                <h3 class="text-xl font-bold text-slate-800 mb-6 font-title" id="qr-task-title-2"></h3>
                <div class="qr-wrapper inline-block mb-6">
                    <div id="qr-image" class="flex justify-center"></div>
                </div>
                <div class="bg-indigo-50 rounded-xl p-3 mb-6 border border-indigo-100">
                    <p class="text-[10px] text-indigo-400 font-bold uppercase tracking-widest mb-1">참여 코드</p>
                    <p id="room-code-display" class="text-2xl font-black text-indigo-600 tracking-[0.3em] font-fun"></p>
                </div>
                <div class="inline-flex items-center gap-3 bg-indigo-50 text-indigo-700 rounded-2xl px-6 py-3 mb-6">
                    <span class="relative flex h-3 w-3" id="live-dot">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-indigo-500"></span>
                    </span>
                    <span class="font-medium font-fun">현재 <strong id="vote-count" class="text-2xl font-black">0</strong>표 참여</span>
                </div>
                <!-- 투표 마감 버튼 -->
                <div id="close-vote-section">
                    <button onclick="closeVoting()" id="btn-close-vote"
                        class="w-full py-3.5 btn-danger text-white rounded-xl font-bold shadow-md">
                        🔒 투표 마감하기
                    </button>
                </div>
                <div id="vote-closed-badge" class="hidden">
                    <div class="closed-badge text-white rounded-xl px-6 py-3 font-bold font-fun text-lg">
                        🔒 투표가 마감되었습니다
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== 투표 페이지 ========== -->
    <div id="page-vote" class="page flex-col min-h-screen bg-slate-50">
        <header class="gradient-main text-white px-6 py-5 shadow-lg">
            <div class="max-w-lg mx-auto text-center">
                <h2 class="text-xl font-bold font-title" id="vote-task-title">투표</h2>
                <p class="text-white/60 text-sm mt-1 font-fun">가장 우수한 팀 하나를 선택해주세요</p>
            </div>
        </header>
        <div class="flex-1 max-w-lg mx-auto w-full p-5">
            <div id="team-cards" class="space-y-3 mb-6"></div>
            <button id="btn-submit-vote" onclick="submitVote()" disabled
                class="w-full py-4 bg-slate-200 text-slate-400 rounded-2xl font-bold text-lg transition-all cursor-not-allowed">
                팀을 선택해주세요
            </button>
        </div>
        <div id="vote-done-overlay" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center z-50">
            <div class="bg-white rounded-3xl p-10 text-center max-w-xs mx-4 fade-in-up shadow-2xl">
                <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-5">
                    <span class="text-4xl">✅</span>
                </div>
                <h3 class="text-2xl font-bold text-slate-800 mb-1 font-title">투표 완료!</h3>
                <p class="text-slate-400 mb-8 text-sm">소중한 한 표 감사합니다</p>
                <button onclick="showPage('page-home')" class="w-full py-3.5 btn-primary text-white rounded-xl font-bold">확인</button>
            </div>
        </div>
    </div>

    <!-- ========== 결과 페이지 ========== -->
    <div id="page-result" class="page flex-col min-h-screen bg-slate-50">
        <header class="gradient-main text-white px-6 py-5 shadow-lg">
            <div class="max-w-lg mx-auto flex items-center gap-4">
                <button onclick="showPage('page-qr')" class="w-10 h-10 rounded-xl glass flex items-center justify-center hover:bg-white/25 transition-all text-lg">←</button>
                <h2 class="text-xl font-bold flex-1 font-title">투표 결과</h2>
                <button onclick="openProjector()" class="px-3 py-2 glass rounded-xl text-sm font-bold hover:bg-white/25 transition-all" title="프로젝터 모드">📽️</button>
                <button onclick="showPage('page-home')" class="w-10 h-10 rounded-xl glass flex items-center justify-center hover:bg-white/25 transition-all text-lg">🏠</button>
            </div>
        </header>
        <div class="flex-1 max-w-lg mx-auto w-full p-5">
            <div id="result-task-name" class="text-center mb-4 fade-in-up">
                <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold mb-1">과제</p>
                <h3 class="text-xl font-bold text-slate-800 font-title"></h3>
            </div>
            <!-- 순위 공개 버튼 -->
            <div id="reveal-section" class="text-center mb-6">
                <button onclick="startReveal()" id="btn-reveal"
                    class="px-8 py-4 btn-primary text-white rounded-2xl font-bold text-lg shadow-lg font-fun">
                    🎬 순위 공개하기
                </button>
            </div>
            <div id="winner-section" class="mb-6"></div>
            <div id="result-bars" class="space-y-3"></div>
            <p class="text-center mt-6 text-slate-300 text-xs font-medium" id="total-votes-text"></p>
        </div>
    </div>

    <!-- ========== 프로젝터 모드 ========== -->
    <div id="projector-overlay" class="hidden projector-mode">
        <div class="min-h-screen flex flex-col items-center justify-center p-8 md:p-16 relative">
            <button onclick="closeProjector()"
                class="absolute top-6 right-6 w-12 h-12 bg-white/10 hover:bg-white/20 rounded-full flex items-center justify-center text-white text-2xl transition-all z-10">✕</button>
            <div id="proj-content" class="w-full max-w-4xl text-center"></div>
        </div>
    </div>

    <!-- ========== 로딩 오버레이 ========== -->
    <div id="loading-overlay" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[100]">
        <div class="bg-white rounded-2xl px-8 py-6 flex items-center gap-4 shadow-xl">
            <div class="loading-spinner" style="border-color: rgba(99,102,241,0.3); border-top-color: #6366f1;"></div>
            <span class="text-slate-600 font-medium" id="loading-text">불러오는 중...</span>
        </div>
    </div>

<script>
const GRADIENTS = [
    'gradient-card-1','gradient-card-2','gradient-card-3','gradient-card-4',
    'gradient-card-5','gradient-card-6','gradient-card-7','gradient-card-8'
];
const EMOJIS = ['🩷','💙','💚','🧡','💜','❤️','🩵','💛'];
const GRAD_COLORS = [
    ['#f472b6','#ec4899'],['#38bdf8','#3b82f6'],['#34d399','#10b981'],['#fb923c','#f97316'],
    ['#a78bfa','#8b5cf6'],['#f87171','#ef4444'],['#2dd4bf','#14b8a6'],['#fbbf24','#f59e0b']
];

let db = null, currentRoom = null, sessionConfig = null, selectedTeam = null, voteListener = null;
let revealInProgress = false;

// ========== Firebase ==========
const DEFAULT_FB_CONFIG = {
    apiKey: "AIzaSyBSu2xGWCIwXwkWaTsS24eLpuu9lXc7Sfs",
    authDomain: "prime-motif-495504-n4.firebaseapp.com",
    databaseURL: "https://prime-motif-495504-n4-default-rtdb.firebaseio.com",
    projectId: "prime-motif-495504-n4",
    storageBucket: "prime-motif-495504-n4.firebasestorage.app",
    messagingSenderId: "342640634708",
    appId: "1:342640634708:web:49fd2d940e91d52adeb6c1"
};

function getFirebaseConfig() {
    try { const r = localStorage.getItem('fb-config'); return r ? JSON.parse(r) : DEFAULT_FB_CONFIG; }
    catch { return DEFAULT_FB_CONFIG; }
}
function initFirebase(config) {
    if (!firebase.apps.length) firebase.initializeApp(config);
    db = firebase.database();
}
function saveFirebaseConfig() {
    const raw = document.getElementById('firebase-config-input').value.trim();
    const err = document.getElementById('firebase-error');
    err.classList.add('hidden');
    let config;
    try { config = JSON.parse(raw); } catch { err.textContent='JSON 형식 오류'; err.classList.remove('hidden'); return; }
    if (!config.databaseURL) { err.textContent='databaseURL 없음'; err.classList.remove('hidden'); return; }
    try {
        initFirebase(config);
        localStorage.setItem('fb-config', JSON.stringify(config));
        showPage('page-admin');
    } catch(e) { err.textContent='연결 실패: '+e.message; err.classList.remove('hidden'); }
}
function ensureFirebase() {
    if (db) return true;
    const c = getFirebaseConfig(); if (!c) return false;
    initFirebase(c); return true;
}

// ========== 페이지 전환 ==========
function showPage(id) {
    if (['page-admin','page-qr','page-result'].includes(id) && !ensureFirebase()) id = 'page-firebase';
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (voteListener) { voteListener(); voteListener = null; }
    const inits = { 'page-admin': initAdmin, 'page-qr': initQR, 'page-vote': initVote, 'page-result': initResult };
    if (inits[id]) inits[id]();
}
function showLoading(t) { document.getElementById('loading-text').textContent=t||'불러오는 중...'; document.getElementById('loading-overlay').classList.remove('hidden'); }
function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }

// ========== 관리자 ==========
function initAdmin() {
    const teams = JSON.parse(localStorage.getItem('admin-teams')||'null') || ['1팀','2팀','3팀'];
    document.getElementById('input-task').value = localStorage.getItem('admin-task') || '';
    const c = document.getElementById('team-inputs'); c.innerHTML = '';
    teams.forEach((n,i) => addTeamField(n,i));
    updateRemoveBtn();
}
function addTeamField(name, idx) {
    const c = document.getElementById('team-inputs');
    const d = document.createElement('div');
    d.className = 'flex items-center gap-3 slide-in';
    d.style.animationDelay = `${idx*0.05}s`;
    d.innerHTML = `<span class="w-9 h-9 rounded-xl ${GRADIENTS[idx%8]} flex items-center justify-center text-white text-sm flex-shrink-0 shadow-sm">${EMOJIS[idx%8]}</span>
        <input type="text" value="${name}" placeholder="팀 이름 입력" class="team-name-input flex-1 px-4 py-3 border-2 border-slate-200 rounded-xl text-base focus:border-indigo-500 focus:outline-none transition-all bg-slate-50 placeholder:text-slate-300">`;
    c.appendChild(d);
}
function addTeamInput() {
    const c = document.getElementById('team-inputs');
    if (c.children.length >= 10) return alert('최대 10팀');
    addTeamField(`${c.children.length+1}팀`, c.children.length);
    updateRemoveBtn();
}
function removeTeamInput() {
    const c = document.getElementById('team-inputs');
    if (c.children.length <= 2) return;
    c.lastChild.remove(); updateRemoveBtn();
}
function updateRemoveBtn() {
    const n = document.getElementById('team-inputs').children.length;
    const b = document.getElementById('btn-remove-team');
    b.disabled = n<=2; b.classList.toggle('opacity-30',n<=2); b.classList.toggle('cursor-not-allowed',n<=2);
}
function genCode() {
    const ch = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let c='';
    for(let i=0;i<6;i++) c+=ch[Math.floor(Math.random()*ch.length)]; return c;
}
async function saveSettings() {
    const task = document.getElementById('input-task').value.trim();
    if (!task) return alert('과제명을 입력해주세요.');
    const teams = Array.from(document.querySelectorAll('.team-name-input')).map(i=>i.value.trim()).filter(Boolean);
    if (teams.length < 2) return alert('최소 2팀 이상');
    if (!ensureFirebase()) return showPage('page-firebase');
    showLoading('투표방 생성 중...');
    const code = genCode();
    try {
        await db.ref('rooms/'+code+'/config').set({ task, teams, createdAt: Date.now(), closed: false });
        currentRoom = code; sessionConfig = { task, teams, closed: false };
        localStorage.setItem('admin-task', task);
        localStorage.setItem('admin-teams', JSON.stringify(teams));
        localStorage.setItem('current-room', code);
        hideLoading(); showPage('page-qr');
    } catch(e) { hideLoading(); alert('실패: '+e.message); }
}
function resetFirebase() {
    if (!confirm('설정을 초기화합니다.')) return;
    ['fb-config','current-room','admin-task','admin-teams'].forEach(k=>localStorage.removeItem(k));
    db=null; showPage('page-firebase');
}

// ========== 투표 마감 ==========
async function closeVoting() {
    if (!confirm('투표를 마감합니다. 마감 후에는 더 이상 투표할 수 없습니다.\n계속하시겠습니까?')) return;
    try {
        await db.ref('rooms/'+currentRoom+'/config/closed').set(true);
        updateCloseUI(true);
    } catch(e) { alert('마감 실패: '+e.message); }
}
function updateCloseUI(closed) {
    document.getElementById('close-vote-section').classList.toggle('hidden', closed);
    document.getElementById('vote-closed-badge').classList.toggle('hidden', !closed);
    document.getElementById('qr-status-text').textContent = closed ? '투표가 마감되었습니다' : 'QR코드를 스캔하여 투표에 참여하세요';
    const dot = document.getElementById('live-dot');
    if (closed) {
        dot.innerHTML = '<span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>';
    } else {
        dot.innerHTML = '<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-indigo-500"></span>';
    }
}

// ========== QR코드 ==========
function initQR() {
    if (!currentRoom) { currentRoom = localStorage.getItem('current-room'); if (!currentRoom) return showPage('page-admin'); }
    db.ref('rooms/'+currentRoom+'/config').on('value', snap => {
        const d = snap.val(); if (!d) return;
        sessionConfig = d;
        document.getElementById('qr-task-title').textContent = d.task;
        document.getElementById('qr-task-title-2').textContent = d.task;
        document.getElementById('room-code-display').textContent = currentRoom;
        updateCloseUI(!!d.closed);
    });
    const base = window.location.href.split('?')[0].split('#')[0];
    generateQR(base+'?room='+currentRoom);
    listenVoteCount();
}
function listenVoteCount() {
    if (voteListener) voteListener();
    const ref = db.ref('rooms/'+currentRoom+'/votes');
    const cb = ref.on('value', snap => {
        document.getElementById('vote-count').textContent = Object.keys(snap.val()||{}).length;
    });
    voteListener = () => ref.off('value', cb);
}
function generateQR(text) {
    const c = document.getElementById('qr-image'); c.innerHTML='';
    const img = document.createElement('img');
    img.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&color=4f46e5&data=${encodeURIComponent(text)}`;
    img.alt='QR코드'; img.width=200; img.height=200; img.style.borderRadius='8px';
    img.onerror = () => { c.innerHTML='<p class="text-slate-400 text-sm p-6">QR 실패 — 코드로 참여</p>'; };
    c.appendChild(img);
}

// ========== 투표 참여 ==========
function joinByCode() {
    const code = prompt('참여 코드 6자리를 입력하세요:');
    if (!code) return;
    joinRoom(code.trim().toUpperCase());
}
async function joinRoom(code) {
    if (!ensureFirebase()) return;
    showLoading('투표방 확인 중...');
    try {
        const snap = await db.ref('rooms/'+code+'/config').once('value');
        const d = snap.val();
        if (!d) { hideLoading(); alert('존재하지 않는 코드입니다.'); return; }
        currentRoom = code; sessionConfig = d; hideLoading(); showPage('page-vote');
    } catch(e) { hideLoading(); alert('연결 실패: '+e.message); }
}

// ========== 투표 ==========
function initVote() {
    document.getElementById('vote-done-overlay').classList.add('hidden');
    document.getElementById('btn-submit-vote').style.display = '';
    selectedTeam = null;
    if (!sessionConfig || !currentRoom) {
        document.getElementById('team-cards').innerHTML = `<div class="text-center py-20 fade-in-up"><div class="text-5xl mb-4">😅</div><h3 class="text-xl font-bold text-slate-700 mb-2 font-title">투표 정보 없음</h3><p class="text-slate-400 text-sm">QR코드를 다시 스캔해주세요</p></div>`;
        document.getElementById('btn-submit-vote').style.display = 'none'; return;
    }
    // 마감 확인
    if (sessionConfig.closed) {
        document.getElementById('team-cards').innerHTML = `<div class="text-center py-20 fade-in-up"><div class="text-5xl mb-4">🔒</div><h3 class="text-xl font-bold text-slate-700 mb-2 font-title">투표가 마감되었습니다</h3><p class="text-slate-400 text-sm">이미 투표가 종료되었습니다</p></div>`;
        document.getElementById('btn-submit-vote').style.display = 'none'; return;
    }
    document.getElementById('vote-task-title').textContent = sessionConfig.task;
    const uid = getVoterId();
    db.ref('rooms/'+currentRoom+'/votes/'+uid).once('value').then(snap => {
        snap.val() ? showAlreadyVoted() : renderTeamCards();
    });
}
function renderTeamCards() {
    const c = document.getElementById('team-cards'); c.innerHTML='';
    sessionConfig.teams.forEach((team,i) => {
        const card = document.createElement('button');
        card.className = `team-card w-full rounded-2xl p-5 ${GRADIENTS[i%8]} text-white shadow-md text-left fade-in-up`;
        card.style.animationDelay = `${i*0.08}s`;
        card.innerHTML = `<div class="flex items-center gap-4"><span class="text-3xl">${EMOJIS[i%8]}</span><span class="text-xl font-bold flex-1 font-fun">${team}</span><div class="w-7 h-7 rounded-full border-2 border-white/50 flex items-center justify-center transition-all team-check"><svg class="w-4 h-4 opacity-0 transition-opacity" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg></div></div>`;
        card.onclick = () => selectTeam(team, card);
        c.appendChild(card);
    });
    updateVoteBtn();
}
function selectTeam(team, card) {
    selectedTeam = team;
    document.querySelectorAll('.team-card').forEach(c => {
        c.classList.remove('ring-4','ring-white','shadow-2xl','selected');
        c.querySelector('.team-check').classList.remove('bg-white/40');
        c.querySelector('svg').classList.add('opacity-0');
    });
    card.classList.add('ring-4','ring-white','shadow-2xl','selected');
    card.querySelector('.team-check').classList.add('bg-white/40');
    card.querySelector('svg').classList.remove('opacity-0');
    updateVoteBtn();
}
function updateVoteBtn() {
    const b = document.getElementById('btn-submit-vote');
    if (selectedTeam) { b.disabled=false; b.className='w-full py-4 btn-primary text-white rounded-2xl font-bold text-lg shadow-lg cursor-pointer'; b.textContent=`'${selectedTeam}' 에 투표하기`; }
    else { b.disabled=true; b.className='w-full py-4 bg-slate-200 text-slate-400 rounded-2xl font-bold text-lg cursor-not-allowed transition-all'; b.textContent='팀을 선택해주세요'; }
}
async function submitVote() {
    if (!selectedTeam || !currentRoom) return;
    // 마감 재확인
    const configSnap = await db.ref('rooms/'+currentRoom+'/config/closed').once('value');
    if (configSnap.val()) { alert('투표가 마감되었습니다.'); return; }
    const uid = getVoterId();
    const b = document.getElementById('btn-submit-vote'); b.disabled=true; b.innerHTML='<span class="loading-spinner"></span>';
    try {
        const snap = await db.ref('rooms/'+currentRoom+'/votes/'+uid).once('value');
        if (snap.val()) return showAlreadyVoted();
        await db.ref('rooms/'+currentRoom+'/votes/'+uid).set({ team: selectedTeam, timestamp: Date.now() });
        document.getElementById('vote-done-overlay').classList.remove('hidden');
    } catch(e) { alert('투표 실패: '+e.message); updateVoteBtn(); }
}
function showAlreadyVoted() {
    document.getElementById('team-cards').innerHTML = `<div class="text-center py-20 fade-in-up"><div class="w-20 h-20 bg-amber-50 rounded-full flex items-center justify-center mx-auto mb-5"><span class="text-4xl">🙏</span></div><h3 class="text-xl font-bold text-slate-700 mb-2 font-title">이미 투표하셨습니다</h3><p class="text-slate-400 text-sm">한 사람당 한 번만 투표 가능</p></div>`;
    document.getElementById('btn-submit-vote').style.display = 'none';
}
function getVoterId() {
    let id = localStorage.getItem('voter-uid');
    if (!id) { id = 'v_'+Math.random().toString(36).slice(2)+Date.now(); localStorage.setItem('voter-uid', id); }
    return id;
}

// ========== 결과 데이터 ==========
function getResultData(callback) {
    if (!currentRoom) { currentRoom = localStorage.getItem('current-room'); if (!currentRoom) return; }
    db.ref('rooms/'+currentRoom).once('value').then(snap => {
        const room = snap.val(); if (!room?.config) return;
        const config = room.config, raw = room.votes || {};
        const counts = {}; config.teams.forEach(t => counts[t]=0);
        Object.values(raw).forEach(v => { if (counts[v.team]!==undefined) counts[v.team]++; });
        const total = Object.values(counts).reduce((a,b)=>a+b,0);
        const sorted = config.teams.map(t=>({name:t, votes:counts[t]||0, idx:config.teams.indexOf(t)})).sort((a,b)=>b.votes-a.votes);
        callback({ config, total, sorted });
    });
}

// ========== 결과 페이지 ==========
function initResult() {
    revealInProgress = false;
    document.getElementById('reveal-section').classList.remove('hidden');
    document.getElementById('btn-reveal').disabled = false;
    document.getElementById('winner-section').innerHTML = '';
    document.getElementById('result-bars').innerHTML = '';
    document.getElementById('total-votes-text').textContent = '';

    getResultData(({ config, total }) => {
        document.querySelector('#result-task-name h3').textContent = config.task;
        document.getElementById('total-votes-text').textContent = `총 ${total}명 참여`;
        if (total === 0) {
            document.getElementById('reveal-section').innerHTML = `<div class="bg-slate-100 rounded-3xl p-10 text-center border-2 border-dashed border-slate-200 mb-6"><div class="text-5xl mb-3">🗳️</div><p class="text-slate-400 font-bold font-fun">아직 투표가 없습니다</p></div>`;
        }
    });
}

// ========== 극적 순위 공개 ==========
async function startReveal() {
    if (revealInProgress) return;
    revealInProgress = true;
    document.getElementById('btn-reveal').disabled = true;

    getResultData(async ({ config, total, sorted }) => {
        if (total === 0) return;
        document.getElementById('reveal-section').classList.add('hidden');
        const barsEl = document.getElementById('result-bars');
        barsEl.innerHTML = '';
        const maxV = sorted[0].votes || 1;

        // 꼴등부터 하나씩 공개
        for (let i = sorted.length - 1; i >= 0; i--) {
            const t = sorted[i];
            const pct = total > 0 ? Math.round(t.votes/total*100) : 0;
            const barW = maxV > 0 ? (t.votes/maxV*100) : 0;
            const rank = i + 1;
            const medal = i===0&&t.votes>0?'🥇': i===1&&t.votes>0?'🥈': i===2&&t.votes>0?'🥉':'';

            const div = document.createElement('div');
            div.className = 'result-row';
            div.innerHTML = `
                <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
                    <div class="flex items-center gap-3 mb-2.5">
                        <span class="text-lg font-fun">${medal || '#'+rank}</span>
                        <span class="font-bold text-slate-800 flex-1 font-fun text-lg">${t.name}</span>
                        <span class="font-black text-lg text-indigo-600">${t.votes}<span class="text-xs text-slate-400 font-medium ml-1">(${pct}%)</span></span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                        <div class="bar-fill h-full rounded-full ${GRADIENTS[t.idx%8]}" style="width:0" data-w="${barW}%"></div>
                    </div>
                </div>`;
            barsEl.prepend(div);

            await sleep(600);
            div.classList.add('visible');
            await sleep(200);
            div.querySelector('.bar-fill').style.width = div.querySelector('.bar-fill').dataset.w;
            await sleep(800);
        }

        // 우승팀 극적 공개
        if (sorted[0].votes > 0) {
            await sleep(500);
            const w = sorted[0];
            const ws = document.getElementById('winner-section');
            ws.innerHTML = `
                <div class="scale-in winner-glow ${GRADIENTS[w.idx%8]} rounded-3xl p-8 text-white text-center relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-b from-white/10 to-transparent pointer-events-none"></div>
                    <div class="relative z-10">
                        <div class="text-5xl mb-3 crown-drop">🏆</div>
                        <p class="text-white/70 text-xs font-bold uppercase tracking-widest mb-2 font-fun">우수팀 선정</p>
                        <h2 class="font-display text-4xl mb-3 shimmer-text">${w.name}</h2>
                        <p class="text-xl font-bold text-white/90 font-fun">${w.votes}표 · ${Math.round(w.votes/total*100)}%</p>
                    </div>
                </div>`;
            await sleep(300);
            fireConfetti();
        }
        revealInProgress = false;
    });
}

function fireConfetti() {
    const end = Date.now() + 2500;
    const frame = () => {
        confetti({ particleCount: 3, angle: 60, spread: 55, origin:{x:0}, colors:['#6366f1','#ec4899','#f59e0b'] });
        confetti({ particleCount: 3, angle: 120, spread: 55, origin:{x:1}, colors:['#10b981','#3b82f6','#a855f7'] });
        if (Date.now() < end) requestAnimationFrame(frame);
    };
    frame();
}

// ========== 프로젝터 모드 ==========
function openProjector() {
    getResultData(({ config, total, sorted }) => {
        const el = document.getElementById('proj-content');
        const maxV = sorted[0]?.votes || 1;

        let barsHtml = '';
        sorted.forEach((t, i) => {
            const pct = total > 0 ? Math.round(t.votes/total*100) : 0;
            const barW = maxV > 0 ? (t.votes/maxV*100) : 0;
            const medal = i===0&&t.votes>0?'🥇': i===1&&t.votes>0?'🥈': i===2&&t.votes>0?'🥉':'';
            const c = GRAD_COLORS[t.idx%8];
            barsHtml += `
                <div class="flex items-center gap-4 md:gap-6 mb-4 md:mb-6 slide-up" style="animation-delay:${0.3+i*0.15}s">
                    <span class="text-3xl md:text-4xl w-12 text-center">${medal || EMOJIS[t.idx%8]}</span>
                    <div class="flex-1 text-left">
                        <div class="flex items-baseline justify-between mb-2">
                            <span class="text-white text-xl md:text-3xl proj-team">${t.name}</span>
                            <span class="text-white/80 text-lg md:text-2xl proj-rank">${t.votes}표 (${pct}%)</span>
                        </div>
                        <div class="w-full bg-white/10 rounded-full h-4 md:h-6 overflow-hidden">
                            <div class="h-full rounded-full bar-fill" style="width:0;background:linear-gradient(90deg,${c[0]},${c[1]})" data-w="${barW}%"></div>
                        </div>
                    </div>
                </div>`;
        });

        let winnerHtml = '';
        if (total > 0 && sorted[0].votes > 0) {
            const w = sorted[0];
            winnerHtml = `
                <div class="scale-in mb-10 md:mb-14">
                    <div class="text-6xl md:text-8xl mb-4 crown-drop">🏆</div>
                    <p class="text-white/50 text-sm md:text-lg tracking-widest uppercase mb-3 proj-rank">우수팀 선정</p>
                    <h1 class="text-5xl md:text-8xl text-white proj-team shimmer-text mb-3">${w.name}</h1>
                    <p class="text-2xl md:text-4xl text-white/70 proj-rank">${w.votes}표 · ${Math.round(w.votes/total*100)}%</p>
                </div>`;
        }

        el.innerHTML = `
            <p class="text-white/40 text-sm md:text-base tracking-widest uppercase mb-2 proj-rank">과제</p>
            <h2 class="text-2xl md:text-4xl text-white mb-8 md:mb-12 proj-title">${config.task}</h2>
            ${winnerHtml}
            <div class="text-left max-w-2xl mx-auto">${barsHtml}</div>
            <p class="text-white/30 text-xs md:text-sm mt-8 proj-rank">총 ${total}명 참여</p>`;

        document.getElementById('projector-overlay').classList.remove('hidden');

        setTimeout(() => {
            document.querySelectorAll('#proj-content .bar-fill').forEach(b => b.style.width = b.dataset.w);
        }, 800);

        if (total > 0 && sorted[0].votes > 0) setTimeout(fireConfetti, 600);
    });
}
function closeProjector() {
    document.getElementById('projector-overlay').classList.add('hidden');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ========== 자동 초기화 ==========
(function boot() {
    const config = getFirebaseConfig();
    if (config) initFirebase(config);
    const params = new URLSearchParams(window.location.search);
    const roomCode = params.get('room');
    if (roomCode && db) joinRoom(roomCode.toUpperCase());
})();
</script>
